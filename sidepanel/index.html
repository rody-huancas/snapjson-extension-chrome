<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapJson</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>SnapJson</h1>
      <p class="subtitle">Panel lateral para capturar JSON</p>
    </header>

    <section class="status">
      <span id="status">Cargando...</span>
    </section>

    <section class="controls">
      <button id="paste-btn" type="button">Pegar JSON</button>
      <button id="format-btn" type="button">Formatear</button>
      <button id="clear-btn" type="button">Limpiar</button>
    </section>

    <section class="input">
      <label for="json-input">Entrada JSON</label>
      <textarea id="json-input" placeholder='{"hello": "world"}'></textarea>
    </section>

    <main>
      <pre id="json-display">{}</pre>
    </main>

    <script src="script.js"></script>
  </body>
</html>
